syntax = "proto3";

// Package discovery.v1 is the stable wire contract for yellow-pages.
//
// APPEND-ONLY POLICY: this contract must remain backward compatible across a
// mixed-version mesh. Never renumber or retype an existing field and never
// reuse a field number; to drop a field, stop using it and add it to a
// `reserved` range. Errors are conveyed via gRPC status codes, never embedded
// in response bodies. All three transport adapters (native gRPC, Consul HTTP,
// Consul DNS) project this single contract. The buf breaking-gate (M8) enforces
// this from the first real change.
package discovery.v1;

option go_package = "github.com/ks-tool/yellow-pages/proto/discovery/v1;discoveryv1";

// HealthState is the derived liveness of a service instance. maintenance is a
// separate flag (see ServiceEntry), not a health state.
enum HealthState {
  HEALTH_STATE_UNSPECIFIED = 0;
  HEALTH_STATE_PASSING = 1;
  HEALTH_STATE_WARNING = 2;
  HEALTH_STATE_CRITICAL = 3;
}

// ChangeType classifies a Watch event.
enum ChangeType {
  CHANGE_TYPE_UNSPECIFIED = 0;
  CHANGE_TYPE_PUT = 1;
  CHANGE_TYPE_DELETE = 2;
}

// Weights influence load balancing. The default is {passing:1, warning:1};
// some balancers treat an absent weight as zero, so it is always populated on
// read surfaces.
message Weights {
  uint32 passing = 1;
  uint32 warning = 2;
}

// Node identifies an agent and its node-scoped attributes. id is the stable
// agent identity carried on every RPC; datacenter is required by the Consul
// surfaces.
message Node {
  string id = 1;
  string name = 2;
  string address = 3;
  string datacenter = 4;
  map<string, string> meta = 5;
  map<string, string> tagged_addresses = 6;
}

// Service is one service instance definition. Identity within an agent is id
// (defaults to name); address/port are mutable data, not identity. tags are an
// ordered list of opaque raw strings — the source of truth (Consul parity).
message Service {
  string id = 1;
  string name = 2;
  string address = 3;
  uint32 port = 4;
  repeated string tags = 5;
  map<string, string> meta = 6;
  Weights weights = 7;
  // ttl_seconds is the per-service lease window; the server clamps it.
  uint32 ttl_seconds = 8;
}

// Registration is the payload of Register: a node and its services plus the
// client-supplied data version. generation is identical on all seeds for one
// registration and is incremented only when endpoint/tags/meta change; Renew
// does not change it.
message Registration {
  Node node = 1;
  repeated Service services = 2;
  uint64 generation = 3;
}

// ServiceEntry is a merged lookup/watch result: a service instance on a node
// with derived health. generation and last_seen_unix_nano drive the merge
// (max(generation) then max(last_seen)). last_seen is server-stamped.
message ServiceEntry {
  Node node = 1;
  Service service = 2;
  HealthState health = 3;
  bool maintenance = 4;
  uint64 generation = 5;
  int64 last_seen_unix_nano = 6;
}

// Query selects service instances by exact name with optional filters. tags are
// matched against the raw tag strings (AND across multiple).
message Query {
  string name = 1;
  string datacenter = 2;
  repeated string tags = 3;
  bool only_healthy = 4;
}

// ChangeEvent is one entry-level change emitted by Watch.
message ChangeEvent {
  ChangeType type = 1;
  ServiceEntry entry = 2;
}

message RegisterRequest {
  Registration registration = 1;
}

message RegisterResponse {}

message RenewRequest {
  // node_id renews ALL of this agent's services at once (idempotent node-scoped
  // convenience); per-service expiry remains authoritative.
  string node_id = 1;
  // service_ids optionally narrows the renew to specific services.
  repeated string service_ids = 2;
}

message RenewResponse {}

message DeregisterRequest {
  string node_id = 1;
}

message DeregisterResponse {}

message DeregisterServiceRequest {
  string node_id = 1;
  string service_id = 2;
}

message DeregisterServiceResponse {}

message LookupRequest {
  Query query = 1;
}

message LookupResponse {
  repeated ServiceEntry entries = 1;
  uint64 index = 2;
}

message WatchRequest {
  Query query = 1;
  // index blocks until the registry index exceeds it (long poll). 0 returns
  // the current state immediately.
  uint64 index = 2;
}

message WatchResponse {
  ChangeEvent event = 1;
  uint64 index = 2;
  // snapshot_done marks the end of the initial state snapshot (a burst of put
  // events for the entries that already exist); subsequent responses are live
  // changes. Added in M8 (append-only).
  bool snapshot_done = 3;
}

// AgentService is the native discovery API.
service AgentService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Renew(RenewRequest) returns (RenewResponse);
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);
  rpc DeregisterService(DeregisterServiceRequest) returns (DeregisterServiceResponse);
  rpc Lookup(LookupRequest) returns (LookupResponse);
  rpc Watch(WatchRequest) returns (stream WatchResponse);
}

// BootstrapService hands a generated, sanitized config to a joining node so
// cluster configs can be refreshed from the seeds without a config-management
// tool. It is served only by seeds (off by default), authenticated by a
// bootstrap token in request metadata, and never returns secret material (TLS
// keys, ACL tokens). Served on the same gRPC server as AgentService.
service BootstrapService {
  // GetConfig returns a rendered config for the requested role. The bootstrap
  // token travels in the "bootstrap-token" metadata header (TLS/mTLS recommended).
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
}

message GetConfigRequest {
  // role is "agent" or "seed" (default "agent"). "seed" requires the cluster to
  // have allow_seed_join enabled, else PermissionDenied.
  string role = 1;
}

message GetConfigResponse {
  // config is the rendered, sanitized YAML config (no TLS keys / ACL tokens).
  bytes config = 1;
}
