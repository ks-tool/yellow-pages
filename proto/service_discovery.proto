syntax = "proto3";

package discovery;

option go_package = "github.com/ks-tool/yellow-pages/proto/gen/discovery";

message Agent {
  string id = 1;
  string address = 2;
  int32 port = 3;
  string datacenter = 4;
  map<string, string> metadata = 5;
}

message Endpoint {
  string name = 1;
  string protocol = 2;
  string address = 3;
  int32 port = 4;
  string path = 5;
  map<string, string> metadata = 6;
}

message Service {
  string name = 1;
  repeated Endpoint endpoints = 3;
  repeated string tags = 4;
  map<string, string> metadata = 5;
}

message AgentInfo {
  Agent agent = 1;
  int64 last_seen = 2;
}

message GetSeedsRequest {}
message GetSeedsResponse { repeated Agent seeds = 1; }

message RegisterAgentRequest {
  Agent agent = 1;
  repeated Service services = 2;
  int64 ttl_seconds = 3;
}
message RegisterAgentResponse {
  bool success = 1;
  string message = 2;
}

message HeartbeatRequest {
  string agent_id = 1;
  repeated Service services = 2;
  int64 ttl_seconds = 3;
}
message HeartbeatResponse {
  bool success = 1;
  string message = 2;
}

message DeregisterAgentRequest { string agent_id = 1; }
message DeregisterAgentResponse {
  bool success = 1;
  string message = 2;
}

message GetServiceAgentsRequest {
  string service_name = 1;
  map<string, string> filters = 2;
}
message GetServiceAgentsResponse { repeated AgentInfo agents = 1; }

message GetRemoteServiceRequest {
  string service_name = 1;
  repeated string tags = 2;
}
message GetRemoteServiceResponse { repeated AgentInfo agents = 1; }

message GetEndpointsRequest { string service_name = 1; }
message GetEndpointsResponse { repeated Endpoint endpoints = 1; }

service AgentService {
  rpc GetEndpoints(GetEndpointsRequest) returns (GetEndpointsResponse) {}
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {}
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse) {}
  rpc DeregisterAgent(DeregisterAgentRequest) returns (DeregisterAgentResponse) {}
  rpc GetServiceAgents(GetServiceAgentsRequest) returns (GetServiceAgentsResponse) {}
  rpc GetRemoteService(GetRemoteServiceRequest) returns (GetRemoteServiceResponse) {}
}
