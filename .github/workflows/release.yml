# Release pipeline (M16): on a SemVer tag, build signed multi-arch artifacts with
# an SBOM, SLSA provenance, a scanned distroless image and checksums.
name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub release
  packages: write # push the OCI image to GHCR
  id-token: write # keyless cosign signing (OIDC)

jobs:
  # Re-run the full quality gate, including the proto breaking-gate, before release.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # buf breaking needs history
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - run: make verify

  binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="yp_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" ./cmd/yp
          sha256sum "$out" > "$out.sha256"
      - name: SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          file: ./go.mod
          format: spdx-json
          output-file: "yp_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.sbom.spdx.json"
      - uses: actions/upload-artifact@v4
        with:
          name: yp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            yp_*
            *.sbom.spdx.json

  image:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true # SLSA provenance attestation
          sbom: true
          build-args: VERSION=${{ github.ref_name }}
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          exit-code: "1"
          severity: HIGH,CRITICAL
      - name: Sign the image (keyless cosign)
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

  release:
    needs: [binaries, image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: sigstore/cosign-installer@v3
      - name: Sign checksums (keyless)
        working-directory: dist
        run: |
          cat *.sha256 > SHA256SUMS
          cosign sign-blob --yes --output-signature SHA256SUMS.sig --output-certificate SHA256SUMS.pem SHA256SUMS
      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # changelog
          files: dist/*
