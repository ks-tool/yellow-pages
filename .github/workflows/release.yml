# Release pipeline (M16): on a SemVer tag, build signed multi-arch artifacts with
# an SBOM, SLSA provenance, a scanned scratch image and checksums.
name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub release
  packages: write # push the OCI image to GHCR
  id-token: write # keyless cosign signing (OIDC)

jobs:
  # Re-run the full quality gate, including the proto breaking-gate, before release.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # buf breaking needs history
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      # `make verify` calls golangci-lint and buf directly (govulncheck is a pinned
      # `go tool`), so both must be on PATH — install them at the versions the gate
      # is validated against.
      - name: Install buf
        run: |
          BIN="$HOME/.local/bin"; mkdir -p "$BIN"
          curl -sSfL "https://github.com/bufbuild/buf/releases/download/v1.71.0/buf-$(uname -s)-$(uname -m)" -o "$BIN/buf"
          chmod +x "$BIN/buf"
          echo "$BIN" >> "$GITHUB_PATH"
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make verify

  binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos:
          - linux
          - darwin
          - windows
        goarch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="yp_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then out="${out}.exe"; fi
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" ./cmd/yp
          sha256sum "$out" > "$out.sha256"
      - name: SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          file: ./go.mod
          format: spdx-json
          output-file: "yp_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.sbom.spdx.json"
          # Don't attach to the release here — it doesn't exist yet (the `release`
          # job creates it later and attaches the artifacts). Avoids a 404.
          upload-release-assets: "false"
          # Don't auto-upload a separate workflow artifact either: the SBOM file is
          # already bundled into the yp-* artifact by the upload-artifact step below,
          # and the action's own artifact trips download-artifact@v4 in `release`.
          upload-artifact: "false"
      - uses: actions/upload-artifact@v7
        with:
          name: yp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            yp_*
            *.sbom.spdx.json

  image:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true # SLSA provenance attestation
          sbom: true
          build-args: VERSION=${{ github.ref_name }}
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          exit-code: "1"
          severity: HIGH,CRITICAL
      - name: Sign the image (keyless cosign)
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

  release:
    needs: [binaries, image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          pattern: yp-* # only the binary/checksum/SBOM artifacts from `binaries`
          path: dist
          merge-multiple: true
      - uses: sigstore/cosign-installer@v3
      - name: Sign checksums (keyless)
        working-directory: dist
        run: |
          cat *.sha256 > SHA256SUMS
          cosign sign-blob --yes --output-signature SHA256SUMS.sig --output-certificate SHA256SUMS.pem SHA256SUMS
      - name: GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true # changelog
          files: dist/*
