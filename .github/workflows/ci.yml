name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly
  GOTOOLCHAIN: local

jobs:
  build:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          check-latest: false
      - name: Verify modules (go.sum)
        run: go mod verify
      - name: Tidy check
        run: GOFLAGS= go mod tidy -diff
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          check-latest: false
      # Install golangci-lint pinned and run `make lint` (same as the release
      # `verify` job). Avoids golangci-lint-action@v7 (deprecated Node 20) and the
      # non-deterministic `version: latest`.
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint
        run: make lint

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          check-latest: false
      - name: Run govulncheck
        run: go tool govulncheck ./...

  buf:
    name: buf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Install buf and run `buf lint` explicitly (same as `make buf-lint`). We
      # avoid the composite buf-action@v1 (annotates/comments on PRs, needs
      # pull-requests:write) and buf-setup-action (no Node 24 release yet) — a
      # pinned binary keeps the job side-effect-free and off the deprecated Node 20.
      - name: Install buf
        run: |
          BIN="$HOME/.local/bin"; mkdir -p "$BIN"
          curl -sSfL "https://github.com/bufbuild/buf/releases/download/v1.71.0/buf-$(uname -s)-$(uname -m)" -o "$BIN/buf"
          chmod +x "$BIN/buf"
          echo "$BIN" >> "$GITHUB_PATH"
      # Append-only is enforced locally by `make buf-breaking` (baseline = branch
      # HEAD). The CI breaking-gate stays off until the greenfield branch lands on
      # main: main still carries the legacy proto/service_discovery.proto, so a
      # main baseline would falsely flag its intentional removal. Re-enable
      # `buf breaking --against` with a main baseline once that merge happens.
      - name: Lint proto contract
        run: buf lint

  e2e:
    name: e2e (real Consul)
    runs-on: ubuntu-latest # ubuntu runners ship Docker for testcontainers
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          check-latest: false
      - name: e2e suite
        working-directory: e2e
        run: go test -timeout 15m ./...
