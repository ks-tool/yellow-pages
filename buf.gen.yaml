# Cross-language stub generation for the discovery.v1 contract (M9).
#
# Go is generated by `make proto` (local protoc + pinned plugins) into
# proto/discovery/v1. This file generates the Java and Python stubs that non-Go
# consumers import, via buf's hosted plugins (no local toolchains needed):
#
#   make proto-stubs   # buf generate -> gen/java, gen/python
#
# The generated trees under gen/ are build artifacts (git-ignored); the release
# pipeline publishes them. See docs/clients.md for usage examples.
version: v2
plugins:
  - remote: buf.build/protocolbuffers/java
    out: gen/java
  - remote: buf.build/grpc/java
    out: gen/java
  - remote: buf.build/protocolbuffers/python
    out: gen/python
  - remote: buf.build/grpc/python
    out: gen/python
