# Test-stand agent. Register a service on agent1 and discover it here to see the
# cross-seed fan-out + merge work end to end.
role: agent
node_name: agent2
datacenter: dc1
cluster:
  name: demo
  seeds:
    - seed1:9900
    - seed2:9900
listeners:
  grpc: { address: 0.0.0.0, port: 9900 }
  consul_http: { enabled: true, address: 0.0.0.0, port: 8500 }
  dns: { enabled: true, address: 0.0.0.0, port: 8600 }
  metrics: { enabled: true, address: 0.0.0.0, port: 9901 }
